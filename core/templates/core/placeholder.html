{% extends 'base.html' %}
{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] text-center p-6">
    <div class="w-24 h-24 bg-primary/10 rounded-3xl flex items-center justify-center text-primary mb-6 animate-pulse">
        <i data-lucide="construction" class="w-12 h-12"></i>
    </div>
    <h1 class="text-3xl font-extrabold text-textdark mb-3 tracking-tight">Feature Coming Soon</h1>
    <p class="text-muted max-w-sm mx-auto font-medium">We're working hard to bring you the {{ feature_name }} module. Check back soon for updates!</p>
    <a href="{% url 'home' %}" class="mt-8 bg-primary text-white font-bold py-3 px-8 rounded-2xl shadow-lg shadow-primary/20 hover:scale-105 active:scale-95 transition-all">
        Back to Dashboard
    </a>
</div>
{% endblock %}
