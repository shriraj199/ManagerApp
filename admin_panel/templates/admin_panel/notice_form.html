{% extends 'base.html' %}
{% block content %}
<div class="flex flex-col flex-1 max-w-lg mx-auto w-full p-6">
    <div class="mb-8">
        <h1 class="text-3xl font-extrabold text-textdark tracking-tight mb-1 text-primary">Post New Notice</h1>
        <p class="text-xs font-black text-muted uppercase tracking-widest">Keep residents informed & up to date</p>
    </div>

    <form method="post" enctype="multipart/form-data" class="space-y-6 pb-24 animate-in fade-in slide-in-from-bottom-4 duration-500">
        {% csrf_token %}
        <div class="p-8 bg-white border border-bordercolor rounded-[2.5rem] shadow-sm space-y-6">
            <!-- Title -->
            <div class="space-y-2">
                <label class="text-[10px] font-black text-muted uppercase tracking-widest flex items-center px-2">
                    Notice Title
                </label>
                <input type="text" name="title" required placeholder="Meeting Agenda, Updates, etc." 
                       class="w-full bg-gray-50 border border-gray-100 rounded-2xl p-4 text-sm font-bold text-textdark placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:bg-white transition-all">
            </div>

            <!-- Content -->
            <div class="space-y-2">
                <label class="text-[10px] font-black text-muted uppercase tracking-widest flex items-center px-2">
                    Details
                </label>
                <textarea name="content" required placeholder="Write your announcement here..." rows="6"
                       class="w-full bg-gray-50 border border-gray-100 rounded-2xl p-4 text-sm font-bold text-textdark placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-primary focus:bg-white transition-all resize-none"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <!-- Image Upload -->
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-muted uppercase tracking-widest flex items-center px-2">
                        Image (Optional)
                    </label>
                    <div class="relative group h-32">
                        <input type="file" name="image" id="imageInput" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div id="imagePlaceholder" class="h-full bg-gray-50 border border-dashed border-gray-200 rounded-3xl p-4 text-center group-hover:bg-gray-100 transition-all flex flex-col items-center justify-center overflow-hidden">
                            <i data-lucide="image" class="w-6 h-6 text-muted mb-2 group-hover:text-primary"></i>
                            <p class="text-[8px] font-bold text-muted group-hover:text-primary">Add Photo</p>
                        </div>
                        <img id="imagePreview" class="absolute inset-0 w-full h-full object-cover rounded-3xl hidden z-0">
                    </div>
                </div>

                <!-- Video Upload -->
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-muted uppercase tracking-widest flex items-center px-2">
                        Video (Optional)
                    </label>
                    <div class="relative group h-32">
                        <input type="file" name="video" id="videoInput" accept="video/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10">
                        <div id="videoPlaceholder" class="h-full bg-gray-50 border border-dashed border-gray-200 rounded-2xl p-4 text-center group-hover:bg-gray-100 transition-all flex flex-col items-center justify-center overflow-hidden">
                            <i data-lucide="video" class="w-6 h-6 text-muted mb-2 group-hover:text-primary"></i>
                            <p class="text-[8px] font-bold text-muted group-hover:text-primary">Add Video</p>
                        </div>
                        <video id="videoPreview" class="absolute inset-0 w-full h-full object-cover rounded-2xl hidden z-0" muted></video>
                    </div>
                </div>
            </div>
        </div>

        <button type="submit" class="w-full bg-primary text-white font-black py-4 rounded-2xl shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all text-sm tracking-wide">
            Publish Notice
        </button>
    </form>
</div>

<script>
    document.getElementById('imageInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const preview = document.getElementById('imagePreview');
            const placeholder = document.getElementById('imagePlaceholder');
            preview.src = URL.createObjectURL(file);
            preview.classList.remove('hidden');
            placeholder.classList.add('opacity-30');
        }
    });

    document.getElementById('videoInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const preview = document.getElementById('videoPreview');
            const placeholder = document.getElementById('videoPlaceholder');
            preview.src = URL.createObjectURL(file);
            preview.classList.remove('hidden');
            // Stopped auto-play as requested
            placeholder.classList.add('opacity-30');
        }
    });
</script>
{% endblock %}
